<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-JSON // CYBER TOOL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --panel: #0d0d18;
      --border: #1a1a3a;
      --neon-pink: #ff2d6a;
      --neon-cyan: #00f5ff;
      --neon-purple: #b829ff;
      --neon-green: #39ff14;
      --neon-yellow: #ffe600;
      --text: #c8c8e8;
      --dim: #5a5a7a;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Cyber grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.1) 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, #0d0d18 0%, #1a0a2e 100%);
      padding: 16px 28px;
      border-bottom: 1px solid var(--neon-pink);
      box-shadow: 0 0 20px rgba(255,45,106,0.3), inset 0 -1px 0 rgba(255,45,106,0.2);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header::before {
      content: '◆';
      color: var(--neon-pink);
      text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-left: auto;
    }

    header .subtitle span {
      color: var(--neon-cyan);
    }

    .toolbar {
      position: relative;
      z-index: 10;
      background: var(--panel);
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .toolbar button {
      position: relative;
      background: transparent;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      padding: 6px 16px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      overflow: hidden;
    }

    .toolbar button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-cyan);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .toolbar button:hover::before {
      opacity: 0.15;
    }

    .toolbar button:hover {
      color: #fff;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0,245,255,0.4), 0 0 20px rgba(0,245,255,0.2);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    .toolbar button:active {
      transform: scale(0.97);
    }

    .toolbar button.btn-pink {
      color: var(--neon-pink);
      border-color: var(--neon-pink);
    }

    .toolbar button.btn-pink::before {
      background: var(--neon-pink);
    }

    .toolbar button.btn-pink:hover {
      box-shadow: 0 0 10px rgba(255,45,106,0.4), 0 0 20px rgba(255,45,106,0.2);
      text-shadow: 0 0 8px var(--neon-pink);
    }

    .toolbar button.btn-green {
      color: var(--neon-green);
      border-color: var(--neon-green);
    }

    .toolbar button.btn-green::before {
      background: var(--neon-green);
    }

    .toolbar button.btn-green:hover {
      box-shadow: 0 0 10px rgba(57,255,20,0.4), 0 0 20px rgba(57,255,20,0.2);
      text-shadow: 0 0 8px var(--neon-green);
    }

    .toolbar .spacer {
      flex: 1;
    }

    .toolbar .hint {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .toolbar .hint::before {
      content: '// ';
      color: var(--neon-purple);
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      padding: 8px 16px;
      background: var(--panel);
      font-size: 10px;
      color: var(--neon-purple);
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header::before {
      content: '▸';
      color: var(--neon-purple);
      text-shadow: 0 0 5px var(--neon-purple);
    }

    .panel-header .size {
      margin-left: auto;
      color: var(--dim);
      font-size: 9px;
    }

    textarea {
      position: relative;
      flex: 1;
      background: var(--panel);
      color: var(--neon-green);
      border: none;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      outline: none;
      caret-color: var(--neon-cyan);
    }

    textarea::placeholder {
      color: var(--dim);
    }

    textarea::-webkit-scrollbar {
      width: 6px;
    }

    textarea::-webkit-scrollbar-track {
      background: var(--bg);
    }

    textarea::-webkit-scrollbar-thumb {
      background: var(--neon-purple);
      border-radius: 3px;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
      box-shadow: 0 0 8px rgba(184,41,255,0.3);
    }

    #output {
      position: relative;
      background: var(--bg);
      overflow: auto;
      white-space: pre;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      flex: 1;
    }

    #output::-webkit-scrollbar {
      width: 6px;
    }

    #output::-webkit-scrollbar-track {
      background: var(--bg);
    }

    #output::-webkit-scrollbar-thumb {
      background: var(--neon-purple);
      border-radius: 3px;
    }

    .error {
      color: var(--neon-pink);
      padding: 16px;
      font-size: 13px;
      text-shadow: 0 0 5px rgba(255,45,106,0.5);
    }

    .error::before {
      content: '[ERROR] ';
      color: var(--neon-yellow);
    }

    /* JSON syntax colors - cyber */
    .json-key { color: var(--neon-pink); text-shadow: 0 0 5px rgba(255,45,106,0.5); }
    .json-string { color: var(--neon-green); text-shadow: 0 0 5px rgba(57,255,20,0.5); }
    .json-number { color: var(--neon-yellow); text-shadow: 0 0 5px rgba(255,230,0,0.5); }
    .json-boolean { color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0,245,255,0.5); }
    .json-null { color: var(--dim); }
    .json-bracket { color: var(--text); }

    /* Cursor blink effect */
    @keyframes blink {
      0%, 100% { border-color: var(--neon-cyan); }
      50% { border-color: transparent; }
    }

    textarea:focus {
      box-shadow: inset 0 0 30px rgba(0,245,255,0.05);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--panel);
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 10px 24px;
      border-radius: 2px;
      font-size: 12px;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(57,255,20,0.3);
      z-index: 10000;
      transition: transform 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Status bar */
    .status-bar {
      position: relative;
      z-index: 10;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      display: flex;
      gap: 20px;
    }

    .status-bar .item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 5px var(--neon-green);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-bar .dot.error {
      background: var(--neon-pink);
      box-shadow: 0 0 5px var(--neon-pink);
    }
  </style>
</head>
<body>

<header>
  <h1>X-JSON</h1>
  <span class="subtitle">SYS:: <span>ONLINE</span></span>
</header>

<div class="toolbar">
  <button class="btn-pink" onclick="format()">▶ FORMAT</button>
  <button class="btn-cyan" onclick="minify()">⬡ MINIFY</button>
  <button class="btn-green" onclick="copyOutput()">◈ COPY</button>
  <button onclick="clearAll()">◇ CLEAR</button>
  <div class="spacer"></div>
  <span class="hint">paste json input → get formatted output</span>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">INPUT <span class="size" id="input-size">0 B</span></div>
    <textarea id="input" placeholder="// paste your json here..."></textarea>
  </div>
  <div class="divider"></div>
  <div class="panel">
    <div class="panel-header">OUTPUT <span class="size" id="output-size">0 B</span></div>
    <div id="output"></div>
  </div>
</div>

<div class="status-bar">
  <div class="item"><div class="dot" id="status-dot"></div><span id="status-text">READY</span></div>
  <div class="item">LINES: <span id="line-count">0</span></div>
  <div class="item">CHARS: <span id="char-count">0</span></div>
  <div class="item">DEPTH: <span id="depth">0</span></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const inputSize = document.getElementById('input-size');
  const outputSize = document.getElementById('output-size');
  const lineCount = document.getElementById('line-count');
  const charCount = document.getElementById('char-count');
  const depth = document.getElementById('depth');

  let debounceTimer;

  input.addEventListener('input', () => {
    updateStats();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(format, 250);
  });

  function updateStats() {
    const val = input.value;
    inputSize.textContent = formatBytes(new Blob([val]).size);
    charCount.textContent = val.length;
    lineCount.textContent = val ? val.split('\n').length : 0;
  }

  function formatBytes(b) {
    if (b === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB'];
    const i = Math.floor(Math.log(b) / Math.log(k));
    return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function getDepth(obj, d = 0) {
    if (typeof obj !== 'object' || obj === null) return d;
    const vals = Object.values(obj);
    if (!vals.length) return d;
    return Math.max(...vals.map(v => getDepth(v, d + 1)));
  }

  function format() {
    const val = input.value.trim();
    if (!val) {
      output.textContent = '';
      statusDot.className = 'dot';
      statusText.textContent = 'READY';
      outputSize.textContent = '0 B';
      depth.textContent = '0';
      return;
    }

    try {
      const parsed = JSON.parse(val);
      const formatted = JSON.stringify(parsed, null, 2);
      output.innerHTML = syntaxHighlight(formatted);
      outputSize.textContent = formatBytes(new Blob([formatted]).size);
      depth.textContent = getDepth(parsed);
      statusDot.className = 'dot';
      statusText.textContent = 'VALID';
    } catch (e) {
      output.innerHTML = `<div class="error">${e.message}</div>`;
      statusDot.className = 'dot error';
      statusText.textContent = 'ERROR';
      outputSize.textContent = '0 B';
      depth.textContent = '?';
    }
  }

  function minify() {
    const val = input.value.trim();
    if (!val) return;
    try {
      const parsed = JSON.parse(val);
      const minified = JSON.stringify(parsed);
      output.textContent = minified;
      outputSize.textContent = formatBytes(new Blob([minified]).size);
      statusDot.className = 'dot';
      statusText.textContent = 'MINIFIED';
      depth.textContent = getDepth(parsed);
    } catch (e) {
      output.innerHTML = `<div class="error">${e.message}</div>`;
      statusDot.className = 'dot error';
      statusText.textContent = 'ERROR';
    }
  }

  function copyOutput() {
    const text = output.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      showToast('COPIED TO CLIPBOARD');
    });
  }

  function clearAll() {
    input.value = '';
    output.textContent = '';
    statusDot.className = 'dot';
    statusText.textContent = 'READY';
    outputSize.textContent = '0 B';
    inputSize.textContent = '0 B';
    lineCount.textContent = '0';
    charCount.textContent = '0';
    depth.textContent = '0';
    input.focus();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, (match) => {
        if (/:$/.test(match)) {
          return `<span class="json-key">${match.slice(0, -1)}</span>:`;
        } else {
          return `<span class="json-string">${match}</span>`;
        }
      })
      .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
      .replace(/\bnull\b/g, '<span class="json-null">null</span>')
      .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="json-number">$1</span>');
  }
</script>

</body>
</html>
