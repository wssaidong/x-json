<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 格式化工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 16px 24px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    .toolbar {
      background: #16213e;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .toolbar button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #e94560;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .toolbar button:hover {
      background: #e94560;
      color: #fff;
    }

    .toolbar .spacer {
      flex: 1;
    }

    .toolbar .hint {
      font-size: 12px;
      color: #888;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      padding: 8px 16px;
      background: #16213e;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #0f3460;
    }

    textarea {
      flex: 1;
      background: #1a1a2e;
      color: #e0e0e0;
      border: none;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    textarea::placeholder {
      color: #555;
    }

    .divider {
      width: 1px;
      background: #0f3460;
    }

    #output {
      background: #0f0f1a;
      overflow: auto;
      white-space: pre;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
    }

    .error {
      color: #e94560;
      padding: 16px;
      font-size: 13px;
    }

    /* JSON syntax colors */
    .json-key { color: #e94560; }
    .json-string { color: #a8e6a3; }
    .json-number { color: #f9c74f; }
    .json-boolean { color: #90be6d; }
    .json-null { color: #888; }
    .json-bracket { color: #e0e0e0; }
  </style>
</head>
<body>

<header>
  <h1>📋 JSON 格式化工具</h1>
</header>

<div class="toolbar">
  <button onclick="format()">格式化</button>
  <button onclick="minify()">压缩</button>
  <button onclick="copyOutput()">复制结果</button>
  <button onclick="clearAll()">清空</button>
  <div class="spacer"></div>
  <span class="hint">粘贴或输入 JSON，左侧实时显示格式化结果</span>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">输入</div>
    <textarea id="input" placeholder="在此粘贴 JSON 数据..."></textarea>
  </div>
  <div class="divider"></div>
  <div class="panel">
    <div class="panel-header">输出</div>
    <div id="output"></div>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');

  let debounceTimer;

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(format, 300);
  });

  function format() {
    const val = input.value.trim();
    if (!val) {
      output.textContent = '';
      return;
    }

    try {
      const parsed = JSON.parse(val);
      const formatted = JSON.stringify(parsed, null, 2);
      output.innerHTML = syntaxHighlight(formatted);
    } catch (e) {
      output.innerHTML = `<div class="error">❌ 解析错误: ${e.message}</div>`;
    }
  }

  function minify() {
    const val = input.value.trim();
    if (!val) return;
    try {
      const parsed = JSON.parse(val);
      output.textContent = JSON.stringify(parsed);
    } catch (e) {
      output.innerHTML = `<div class="error">❌ 解析错误: ${e.message}</div>`;
    }
  }

  function copyOutput() {
    const text = output.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.toolbar button:nth-child(3)');
      const orig = btn.textContent;
      btn.textContent = '已复制!';
      setTimeout(() => btn.textContent = orig, 1200);
    });
  }

  function clearAll() {
    input.value = '';
    output.textContent = '';
    input.focus();
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, (match) => {
        if (/:$/.test(match)) {
          // key
          return `<span class="json-key">${match.slice(0, -1)}</span>:`;
        } else {
          // string value
          return `<span class="json-string">${match}</span>`;
        }
      })
      .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
      .replace(/\bnull\b/g, '<span class="json-null">null</span>')
      .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="json-number">$1</span>');
  }
</script>

</body>
</html>
